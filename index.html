<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forge Media — Let's Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --charcoal: #141414;
    --card: #1a1a1a;
    --border: #1a3a3a;
    --orange: #00cccc;
    --orange-glow: rgba(0, 204, 204, 0.12);
    --white: #ffffff;
    --grey: #888;
    --light-grey: #ccc;
  }

  html {
    height: 100%;
  }

  body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 20px 24px;
    height: 140px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-img {
    height: 120px;
    width: auto;
    max-width: 80%;
    object-fit: contain;
    object-position: left center;
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
    display: none;
  }

  .header-text p {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 0.5px;
    margin-top: 2px;
    display: none;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #00cccc;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px #00cccc;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeUp 0.35s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-end; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--grey);
    padding: 0 4px;
  }

  .msg.bot .msg-label { color: var(--orange); }

  .bubble {
    max-width: 82%;
    padding: 13px 17px;
    border-radius: 4px;
    line-height: 1.65;
    font-size: 14.5px;
  }

  .msg.bot .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--orange);
    color: var(--light-grey);
  }

  .msg.user .bubble {
    background: var(--orange);
    color: #fff;
    font-weight: 400;
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 24px 16px;
  }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--light-grey);
    padding: 8px 14px;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 300;
  }

  .qr-btn:hover {
    border-color: var(--orange);
    color: var(--white);
    background: var(--orange-glow);
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 12px 15px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    resize: none;
    min-height: 46px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--orange); }
  textarea::placeholder { color: #555; }

  .send-btn {
    width: 46px;
    height: 46px;
    background: var(--orange);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .send-btn:hover { background: #ff7a30; transform: scale(1.03); }
  .send-btn:disabled { background: #333; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--orange);
    border-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--orange);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Enquiry form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--orange);
    border-radius: 4px;
    padding: 20px;
    max-width: 82%;
  }

  .form-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .form-card p {
    font-size: 12px;
    color: var(--grey);
    margin-bottom: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }

  .form-group label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--grey);
  }

  .form-group input, .form-group select, .form-group textarea.form-ta {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 10px 12px;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group select option { background: var(--charcoal); }
  .form-group input:focus, .form-group select:focus, .form-group textarea.form-ta:focus { border-color: var(--orange); }

  .form-group textarea.form-ta { resize: vertical; min-height: 70px; }

  .submit-btn {
    width: 100%;
    background: var(--orange);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 3px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1.5px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s;
  }

  .submit-btn:hover { background: #ff7a30; }

  /* Success */
  .success-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid #00cccc;
    border-radius: 4px;
    padding: 18px 20px;
    max-width: 82%;
  }

  .success-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    color: #00cccc;
    margin-bottom: 5px;
  }

  .success-card p { font-size: 13.5px; color: var(--light-grey); line-height: 1.6; }

  @media (max-width: 768px) {
    .bubble, .form-card, .success-card { max-width: 92%; }
    .header { padding: 12px 14px; }
    .header-text h1 { font-size: 18px; }
    .header-text p { font-size: 10px; }
    .logo-mark { width: 30px; height: 30px; }
    .messages { padding: 14px 12px; gap: 14px; }
    .input-area { padding: 8px 12px 12px; }
    .quick-replies { padding: 0 12px 10px; gap: 6px; }
    .bubble { font-size: 13.5px; padding: 10px 13px; }
    .qr-btn { font-size: 12px; padding: 7px 11px; }
    textarea { font-size: 13px; padding: 10px 12px; min-height: 40px; }
    .send-btn { width: 40px; height: 40px; }
    .msg-label { font-size: 9px; }
    .form-card { padding: 14px; }
    .form-card h3 { font-size: 16px; }
    .submit-btn { font-size: 14px; padding: 10px; }
  }
</style>
</head>

OUR PROCESS:
1. Initial conversation / enquiry form submitted
2. Sit down and discuss packages and what suits the business
3. Onboarding call — understand their business, brand, and goals
4. Set a shoot schedule

let conversationHistory = [];
let formShown = false;

async function callClaude(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  console.log("API response:", JSON.stringify(data));
  if (data.error) {
    console.error("API error:", data.error);
    return "Error: " + (data.error.message || JSON.stringify(data.error));
  }
  const text = data.content?.map(b => b.text || "").join("") || "Sorry, something went wrong.";
  conversationHistory.push({ role: "assistant", content: text });
  return text;
}

function addMessage(role, content) {
  const container = document.getElementById("messages");
  const wrapper = document.createElement("div");
  wrapper.className = `msg ${role}`;

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "bot" ? "FORGE AI" : "YOU";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = content.replace(/\n/g, "<br>");

  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById("messages");
  const wrapper = document.createElement("div");
  wrapper.className = "msg bot";
  wrapper.id = "typing-indicator";

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = "FORGE AI";

  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = "<span></span><span></span><span></span>";

  wrapper.appendChild(label);
  wrapper.appendChild(typing);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function setQuickReplies(replies) {
  const container = document.getElementById("quickReplies");
  container.innerHTML = "";
  replies.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "qr-btn";
    btn.textContent = r;
    btn.onclick = () => { container.innerHTML = ""; sendMessage(r); };
    container.appendChild(btn);
  });
}

  label.textContent = "FORGE AI";

  const card = document.createElement("div");

function submitForm() {
  const name = document.getElementById("f-name").value.trim();
  const email = document.getElementById("f-email").value.trim();
  const phone = document.getElementById("f-phone").value.trim();
  const biz = document.getElementById("f-biz").value.trim();
  const service = document.getElementById("f-service").value;
  const about = document.getElementById("f-about").value.trim();

  if (!name || !email || !service) {
    alert("Please fill in your name, email, and service of interest.");
    return;
  }

  const subject = encodeURIComponent("New Enquiry from " + name + " — " + (biz || "Forge Media Chatbot"));
  const body = encodeURIComponent(
    "NEW FORGE MEDIA ENQUIRY\n" +
    "=======================\n" +
    "Name:     " + name + "\n" +
    "Business: " + (biz || "Not provided") + "\n" +
    "Email:    " + email + "\n" +
    "Phone:    " + (phone || "Not provided") + "\n" +
    "Service:  " + service + "\n\n" +
    "About their business:\n" +
    (about || "Not provided") + "\n\n" +
    "=======================\n" +
    "Submitted via Forge Media chatbot"
  );

  // Send via Web3Forms
  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      access_key: "0177f248-6bd3-420a-9e15-8cf7ba3acd10",
      subject: "New Enquiry from " + name + " — " + (biz || "Forge Media Chatbot"),
      name: name,
      email: email,
      phone: phone || "Not provided",
      business: biz || "Not provided",
      service: service,
      message: about || "Not provided"
    })
  }).catch(err => console.error("Form submission error:", err));

  const forms = document.querySelectorAll(".form-card");
  forms.forEach(f => f.closest(".msg").remove());

  const container = document.getElementById("messages");
  const wrapper = document.createElement("div");
  wrapper.className = "msg bot";

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = "FORGE AI";

  const card = document.createElement("div");
  card.className = "success-card";
  card.innerHTML = "<h3>\u2713 ENQUIRY RECEIVED</h3><p>Thanks " + name + "! Your enquiry has been sent to the Forge Media team. Expect a reply within 24 hours. Get ready to level up your content. \uD83D\uDD25</p>";

  wrapper.appendChild(label);
  wrapper.appendChild(card);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;

  setTimeout(() => {
    addMessage("bot", "While you wait — feel free to check out our work on Instagram. Any other questions, I'm right here.");
  }, 1200);
}

async function sendMessage(override) {
  const input = document.getElementById("userInput");
  const text = override || input.value.trim();
  if (!text) return;

  document.getElementById("quickReplies").innerHTML = "";
  input.value = "";
  input.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;

  addMessage("user", text);
  addTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();

    if (reply.includes("[SHOW_FORM]")) {
      const cleaned = reply.replace("[SHOW_FORM]", "").trim();
      if (cleaned) addMessage("bot", cleaned);
      setTimeout(showEnquiryForm, 400);
    } else {
      addMessage("bot", reply);
      // Contextual quick replies after first message
      if (conversationHistory.length === 2) {
        setQuickReplies(["Tell me more about pricing", "What's included?", "I'm a restaurant", "I'm an e-commerce brand"]);
      }
    }
  } catch (e) {
    removeTyping();
    addMessage("bot", "Something went wrong on my end. Please try again.");
  }

  document.getElementById("sendBtn").disabled = false;
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

});
